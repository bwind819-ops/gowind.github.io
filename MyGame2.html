<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 辅助开发展示 · 贪吃蛇</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #111827;
      --panel: rgba(10, 15, 30, 0.78);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #22c55e;
      --primary-2: #16a34a;
      --danger: #ef4444;
      --gold: #f59e0b;
      --wall: #64748b;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --board-size: min(82vw, 560px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.15), transparent 25%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    .app {
      width: min(94vw, 920px);
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      position: relative;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: 0.03em;
    }

    .title-block p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .panel-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat {
      min-width: 120px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease, box-shadow 0.16s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .board-wrap {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 18px;
      align-items: start;
    }

    .board-card {
      position: relative;
      border-radius: var(--radius);
      padding: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--line);
    }

    canvas {
      width: 100%;
      max-width: var(--board-size);
      aspect-ratio: 1 / 1;
      display: block;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(2, 6, 23, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .overlay {
      position: absolute;
      inset: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(6px);
      text-align: center;
      padding: 20px;
      transition: opacity 0.25s ease, visibility 0.25s ease;
      z-index: 2;
    }

    .overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .overlay-card {
      max-width: 340px;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
    }

    .overlay-card p {
      margin: 0 0 16px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .sidebar {
      display: grid;
      gap: 12px;
    }

    .info-card {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .info-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .info-card p,
    .info-card li {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .info-card ul {
      padding-left: 18px;
      margin: 0;
    }

    .legend {
      display: grid;
      gap: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 5px;
      flex: none;
    }

    .dot-snake {
      background: linear-gradient(135deg, #86efac, #22c55e);
    }

    .dot-food {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
    }

    .dot-wall {
      background: linear-gradient(135deg, #94a3b8, #64748b);
    }

    .controls {
      display: none;
      margin-top: 16px;
      gap: 10px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .control-pad {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      gap: 8px;
    }

    .control-pad button {
      width: 64px;
      height: 64px;
      padding: 0;
      border-radius: 18px;
      font-size: 22px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid var(--line);
    }

    .control-pad .empty {
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 860px) {
      .board-wrap {
        grid-template-columns: 1fr;
      }

      .controls {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title-row">
      <div class="title-block">
        <h1>贪吃蛇 Snake Show</h1>
      </div>
      <div class="panel-row">
        <div class="stat">
          <div class="stat-label">当前分数</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">历史最高</div>
          <div class="stat-value" id="best">0</div>
        </div>
        <div class="actions">
          <button class="btn-primary" id="startBtn">开始游戏</button>
          <button class="btn-secondary" id="restartBtn">重新开始</button>
        </div>
      </div>
    </div>

    <div class="board-wrap">
      <div class="board-card">
        <canvas id="game" width="600" height="600"></canvas>

        <div class="overlay" id="overlay">
          <div class="overlay-card">
            <h2 id="overlayTitle">准备开始</h2>
            <p id="overlayText">点击“开始游戏”或按空格键，吃掉金币方块，避开边界、自己和障碍物。</p>
            <button class="btn-primary" id="overlayBtn">开始游戏</button>
          </div>
        </div>

        <div class="controls">
          <div class="control-pad">
            <button class="empty">•</button>
            <button data-dir="up">↑</button>
            <button class="empty">•</button>
            <button data-dir="left">←</button>
            <button data-dir="down">↓</button>
            <button data-dir="right">→</button>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="info-card">
          <h3>玩法说明</h3>
          <ul>
            <li>键盘方向键或 WASD 控制移动</li>
            <li>每吃到一个金币，分数 +10</li>
            <li>碰到墙壁、障碍物或自己即 Game Over</li>
          </ul>
        </div>

        <div class="info-card">
          <h3>元素图例</h3>
          <div class="legend">
            <div class="legend-item"><span class="dot dot-snake"></span> 绿色方块：蛇身</div>
            <div class="legend-item"><span class="dot dot-food"></span> 金色方块：金币</div>
            <div class="legend-item"><span class="dot dot-wall"></span> 灰色方块：障碍物</div>
          </div>
        </div>

        <div class="info-card">
          <h3>展示亮点</h3>
          <p>单文件结构、零外部依赖、开箱即玩，适合直接在浏览器中展示你的 AI 辅助开发成果。</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const overlayBtn = document.getElementById("overlayBtn");
    const controlButtons = document.querySelectorAll("[data-dir]");

    const GRID_SIZE = 20;
    const CELL = canvas.width / GRID_SIZE;
    const BASE_SPEED = 150;
    const WALL_COUNT = 14;

    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 10, y: 10 };
    let walls = [];
    let score = 0;
    let best = Number(localStorage.getItem("snake-best-score") || 0);
    let timer = null;
    let running = false;
    let started = false;

    bestEl.textContent = best;

    function randomInt(max) {
      return Math.floor(Math.random() * max);
    }

    function samePos(a, b) {
      return a.x === b.x && a.y === b.y;
    }

    function hasObjectAt(pos, items) {
      return items.some(item => samePos(item, pos));
    }

    function createWalls() {
      const newWalls = [];
      while (newWalls.length < WALL_COUNT) {
        const candidate = { x: randomInt(GRID_SIZE), y: randomInt(GRID_SIZE) };

        const nearSpawn =
          (candidate.x >= 1 && candidate.x <= 5 && candidate.y >= 8 && candidate.y <= 12);

        if (nearSpawn) continue;
        if (hasObjectAt(candidate, newWalls)) continue;

        newWalls.push(candidate);
      }
      return newWalls;
    }

    function placeFood() {
      let newFood;
      do {
        newFood = { x: randomInt(GRID_SIZE), y: randomInt(GRID_SIZE) };
      } while (
        hasObjectAt(newFood, snake) ||
        hasObjectAt(newFood, walls)
      );
      food = newFood;
    }

    function resetGame() {
      snake = [
        { x: 4, y: 10 },
        { x: 3, y: 10 },
        { x: 2, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      walls = createWalls();
      score = 0;
      scoreEl.textContent = score;
      placeFood();
      draw();
    }

    function setOverlay(title, text, buttonText) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlayBtn.textContent = buttonText;
      overlay.classList.remove("hidden");
    }

    function hideOverlay() {
      overlay.classList.add("hidden");
    }

    function updateBest() {
      if (score > best) {
        best = score;
        localStorage.setItem("snake-best-score", String(best));
        bestEl.textContent = best;
      }
    }

    function startGame() {
      if (!started) {
        resetGame();
        started = true;
      }
      running = true;
      hideOverlay();
      clearInterval(timer);
      timer = setInterval(gameLoop, Math.max(70, BASE_SPEED - Math.floor(score / 50) * 8));
    }

    function restartGame() {
      started = true;
      running = false;
      clearInterval(timer);
      resetGame();
      setOverlay("重新开始", "点击下方按钮立刻再来一局。", "开始游戏");
    }

    function gameOver() {
      running = false;
      clearInterval(timer);
      updateBest();
      setOverlay("Game Over", `本局得分 ${score} 分，点击按钮重新挑战。`, "重新开始");
    }

    function setDirection(dir) {
      const map = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };
      const chosen = map[dir];
      if (!chosen) return;

      if (chosen.x === -direction.x && chosen.y === -direction.y) return;
      nextDirection = chosen;
    }

    function drawRoundedCell(x, y, color, radius = 8, inset = 3) {
      const px = x * CELL + inset;
      const py = y * CELL + inset;
      const size = CELL - inset * 2;

      ctx.beginPath();
      ctx.moveTo(px + radius, py);
      ctx.lineTo(px + size - radius, py);
      ctx.quadraticCurveTo(px + size, py, px + size, py + radius);
      ctx.lineTo(px + size, py + size - radius);
      ctx.quadraticCurveTo(px + size, py + size, px + size - radius, py + size);
      ctx.lineTo(px + radius, py + size);
      ctx.quadraticCurveTo(px, py + size, px, py + size - radius);
      ctx.lineTo(px, py + radius);
      ctx.quadraticCurveTo(px, py, px + radius, py);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? "rgba(255,255,255,0.03)" : "rgba(255,255,255,0.015)";
          ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
        }
      }
    }

    function drawWalls() {
      walls.forEach(wall => {
        drawRoundedCell(wall.x, wall.y, "#64748b", 7, 4);
        drawRoundedCell(wall.x, wall.y, "rgba(255,255,255,0.14)", 5, 10);
      });
    }

    function drawFood() {
      drawRoundedCell(food.x, food.y, "#f59e0b", 9, 5);
      drawRoundedCell(food.x, food.y, "#fde68a", 7, 11);
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        if (index === 0) {
          drawRoundedCell(segment.x, segment.y, "#22c55e", 10, 3);
          drawRoundedCell(segment.x, segment.y, "#bbf7d0", 8, 10);

          const eyeOffsetX = direction.x === 0 ? 7 : (direction.x === 1 ? 15 : 8);
          const eyeOffsetY = direction.y === 0 ? 7 : (direction.y === 1 ? 15 : 8);

          ctx.fillStyle = "#0f172a";
          ctx.beginPath();
          ctx.arc(segment.x * CELL + eyeOffsetX, segment.y * CELL + 9, 2.2, 0, Math.PI * 2);
          ctx.arc(segment.x * CELL + 9, segment.y * CELL + eyeOffsetY, 2.2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          const alpha = Math.max(0.45, 1 - index * 0.04);
          drawRoundedCell(segment.x, segment.y, `rgba(34, 197, 94, ${alpha})`, 8, 4);
        }
      });
    }

    function draw() {
      drawGrid();
      drawWalls();
      drawFood();
      drawSnake();
    }

    function gameLoop() {
      direction = nextDirection;

      const head = snake[0];
      const newHead = {
        x: head.x + direction.x,
        y: head.y + direction.y
      };

      const hitBoundary =
        newHead.x < 0 ||
        newHead.x >= GRID_SIZE ||
        newHead.y < 0 ||
        newHead.y >= GRID_SIZE;

      const hitWall = hasObjectAt(newHead, walls);
      const hitSelf = hasObjectAt(newHead, snake);

      if (hitBoundary || hitWall || hitSelf) {
        draw();
        gameOver();
        return;
      }

      snake.unshift(newHead);

      if (samePos(newHead, food)) {
        score += 10;
        scoreEl.textContent = score;
        placeFood();

        clearInterval(timer);
        timer = setInterval(gameLoop, Math.max(70, BASE_SPEED - Math.floor(score / 50) * 8));
      } else {
        snake.pop();
      }

      draw();
    }

    function handleKeydown(event) {
      const key = event.key.toLowerCase();

      if (key === " " || key === "spacebar") {
        event.preventDefault();
        if (!running) startGame();
        return;
      }

      if (key === "arrowup" || key === "w") setDirection("up");
      if (key === "arrowdown" || key === "s") setDirection("down");
      if (key === "arrowleft" || key === "a") setDirection("left");
      if (key === "arrowright" || key === "d") setDirection("right");
    }

    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", restartGame);
    overlayBtn.addEventListener("click", startGame);
    window.addEventListener("keydown", handleKeydown);

    controlButtons.forEach(button => {
      button.addEventListener("click", () => {
        setDirection(button.dataset.dir);
        if (!running) startGame();
      });
    });

    resetGame();
    setOverlay("准备开始", "点击“开始游戏”或按空格键，吃掉金币方块，避开边界、自己和障碍物。", "开始游戏");
  </script>
</body>
</html>
